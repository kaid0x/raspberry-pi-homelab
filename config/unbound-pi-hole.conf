# /etc/unbound/unbound.conf.d/pi-hole.conf
# Local recursive DNS resolver for Pi-hole to forward to.
# Pi-hole then uses 127.0.0.1#5335 as its upstream.

server:
    verbosity: 0
    interface: 127.0.0.1
    port: 5335
    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    do-ip6: no
    prefer-ip6: no

    # Trust glue only within the server's authority
    harden-glue: yes
    # Require DNSSEC data for trust-anchored zones
    harden-dnssec-stripped: yes
    use-caps-for-id: no

    # Reduce EDNS buffer to avoid IP fragmentation issues (DNS Flag Day 2020)
    edns-buffer-size: 1232

    prefetch: yes
    num-threads: 1
    so-rcvbuf: 1m

    # Keep local/private ranges private
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8
    private-address: fd00::/8
    private-address: fe80::/10
